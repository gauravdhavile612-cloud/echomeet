<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Matches — EchoMeet</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4F46E5, #A78BFA);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 20px;
      width: 350px;
      text-align: center;
    }

    .match {
      background: rgba(255,255,255,0.2);
      padding: 15px;
      border-radius: 12px;
      margin: 15px 0;
    }

    h1 {
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Your Best Matches 🤝</h1>

    <div class="match">
      <h3>Rahul ⭐ 92% Match</h3>
      <p>Gym lover • Night Owl • Career Focused</p>
    </div>

    <div class="match">
      <h3>Ananya ⭐ 88% Match</h3>
      <p>Introvert • Morning Person • Study Focused</p>
    </div>

  </div>

</body>
</html>

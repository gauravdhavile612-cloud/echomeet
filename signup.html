<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EchoMeet — Signup</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4F46E5, #A78BFA);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 20px;
      width: 350px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: white;
      color: #4F46E5;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Join EchoMeet 💫</h2>

    <input type="text" placeholder="Your Name">

    <select>
      <option>Introvert</option>
      <option>Extrovert</option>
      <option>Ambivert</option>
    </select>

    <select>
      <option>Morning Person</option>
      <option>Night Owl</option>
    </select>

    <select>
      <option>Career Focused</option>
      <option>Balanced Life</option>
      <option>Chill Type</option>
    </select>

    <a href="match.html">
  <button>Find My People 🔥</button>
</a>

  </div>

</body>
</html>
